<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bathroom Smart Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Fons dinàmic: capes d'"ones" ambientals que canvien segons l'hora / el temps -->
  <div id="ambient-bg" aria-hidden="true">
    <div class="ripple ripple-a"></div>
    <div class="ripple ripple-b"></div>
    <div class="ripple ripple-c"></div>
    <div class="grain"></div>
  </div>

  <main id="dashboard">

    <!-- ============ CAPÇALERA: Rellotge ============ -->
    <section id="widget-clock" class="widget widget-clock" data-widget="clock">
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-meta">
        <span id="clock-weekday">—</span>
        <span class="dot">·</span>
        <span id="clock-date">—</span>
      </div>
    </section>

    <!-- ============ TEMPS EXTERIOR ============ -->
    <section id="widget-weather" class="widget widget-weather" data-widget="weather">
      <header class="widget-header">
        <span class="widget-eyebrow" id="weather-place">Exterior</span>
      </header>
      <div class="weather-main">
        <div class="weather-icon" id="weather-icon">⛅</div>
        <div class="weather-temp" id="weather-temp">--°</div>
      </div>
      <div class="weather-details">
        <div class="weather-stat">
          <span class="stat-label">Sensació</span>
          <span class="stat-value" id="weather-feels">--°</span>
        </div>
        <div class="weather-stat">
          <span class="stat-label">Humitat</span>
          <span class="stat-value" id="weather-humidity">--%</span>
        </div>
        <div class="weather-stat">
          <span class="stat-label">Pluja</span>
          <span class="stat-value" id="weather-rain">--%</span>
        </div>
      </div>
    </section>

    <!-- ============ TEMPORITZADOR · columna dreta (l'únic widget interactiu) ============ -->
    <section id="widget-timer" class="widget widget-timer" data-widget="timer">
      <header class="widget-header">
        <span class="widget-eyebrow">Temporitzador</span>
      </header>

      <div class="timer-display" id="timer-display">00:00</div>

      <div class="timer-presets">
        <button class="timer-btn" data-minutes="1">1 min</button>
        <button class="timer-btn" data-minutes="5">5 min</button>
        <button class="timer-btn" data-minutes="10">10 min</button>
        <button class="timer-btn" data-minutes="30">30 min</button>
      </div>

      <div class="timer-custom">
        <input type="number" id="timer-custom-input" min="1" max="180" placeholder="min">
        <button class="timer-btn timer-btn-custom" id="timer-custom-start">Inicia</button>
      </div>

      <div class="timer-controls">
        <button class="timer-btn timer-btn-secondary" id="timer-pause">Pausa</button>
        <button class="timer-btn timer-btn-secondary" id="timer-reset">Reinicia</button>
      </div>

      <audio id="timer-alarm-audio" src="assets/ringtonebath.mp3" preload="auto"></audio>
    </section>

    <!-- ============ CALENDARI ============ -->
    <section id="widget-calendar" class="widget widget-calendar" data-widget="calendar">
      <header class="widget-header">
        <span class="widget-eyebrow">Pròxims esdeveniments</span>
      </header>
      <ul class="calendar-list" id="calendar-list">
        <!-- generat per calendar.js -->
      </ul>
    </section>

    <!-- ============ FOTOGRAFIES · principal ============ -->
<section id="widget-photos" class="widget widget-photos" data-widget="photos">
      <div class="photo-frame">
        <div id="photo-current" class="photo-layer photo-visible"></div>
        <div id="photo-next" class="photo-layer"></div>
      </div>
    </section>

    <!-- ============ NOTÍCIES (tira inferior) ============ -->
    <section id="widget-news" class="widget widget-news" data-widget="news">
      <span class="news-eyebrow">Notícies</span>
      <div class="news-track">
        <span id="news-headline">Carregant titulars…</span>
      </div>
    </section>

  </main>

  <!-- Ordre de càrrega: config i repo primer, app.js al final ho orquestra tot -->
  <script src="js/config.js"></script>
  <script src="js/repo.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/photos.js"></script>
  <script src="js/news.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
