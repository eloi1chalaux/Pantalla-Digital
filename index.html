<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Bathroom Smart Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Fondo dinámico: capas de "ripples" ambientales que cambian según hora / clima -->
  <div id="ambient-bg" aria-hidden="true">
    <div class="ripple ripple-a"></div>
    <div class="ripple ripple-b"></div>
    <div class="ripple ripple-c"></div>
    <div class="grain"></div>
  </div>

  <main id="dashboard">

    <!-- ============ CABECERA: Reloj ============ -->
    <section id="widget-clock" class="widget widget-clock" data-widget="clock">
      <div class="clock-time" id="clock-time">--:--</div>
      <div class="clock-meta">
        <span id="clock-weekday">—</span>
        <span class="dot">·</span>
        <span id="clock-date">—</span>
      </div>
    </section>

    <!-- ============ TIEMPO EXTERIOR ============ -->
    <section id="widget-weather" class="widget widget-weather" data-widget="weather">
      <header class="widget-header">
        <span class="widget-eyebrow">Exterior</span>
      </header>
      <div class="weather-main">
        <div class="weather-icon" id="weather-icon">⛅</div>
        <div class="weather-temp" id="weather-temp">--°</div>
      </div>
      <div class="weather-details">
        <div class="weather-stat">
          <span class="stat-label">Sensación</span>
          <span class="stat-value" id="weather-feels">--°</span>
        </div>
        <div class="weather-stat">
          <span class="stat-label">Humedad</span>
          <span class="stat-value" id="weather-humidity">--%</span>
        </div>
        <div class="weather-stat">
          <span class="stat-label">Lluvia</span>
          <span class="stat-value" id="weather-rain">--%</span>
        </div>
      </div>
    </section>

    <!-- ============ SENSORES DEL BAÑO ============ -->
    <section id="widget-bathroom" class="widget widget-bathroom" data-widget="bathroomSensors">
      <header class="widget-header">
        <span class="widget-eyebrow">Baño</span>
      </header>
      <div class="bathroom-grid">
        <div class="bathroom-stat">
          <span class="stat-value" id="bathroom-temp">--°</span>
          <span class="stat-label">Temperatura</span>
        </div>
        <div class="bathroom-stat">
          <span class="stat-value" id="bathroom-humidity">--%</span>
          <span class="stat-label">Humedad</span>
        </div>
        <div class="bathroom-stat">
          <span class="stat-value" id="bathroom-air">--</span>
          <span class="stat-label">Aire</span>
        </div>
      </div>
    </section>

    <!-- ============ CALENDARIO ============ -->
    <section id="widget-calendar" class="widget widget-calendar" data-widget="calendar">
      <header class="widget-header">
        <span class="widget-eyebrow">Próximos eventos</span>
      </header>
      <ul class="calendar-list" id="calendar-list">
        <!-- generado por calendar.js -->
      </ul>
    </section>

    <!-- ============ FOTOGRAFÍAS ============ -->
    <section id="widget-photos" class="widget widget-photos" data-widget="photos">
      <div class="photo-frame">
        <img id="photo-current" src="" alt="" class="photo-layer photo-visible">
        <img id="photo-next" src="" alt="" class="photo-layer">
      </div>
    </section>

    <!-- ============ NOTICIAS (ticker inferior) ============ -->
    <section id="widget-news" class="widget widget-news" data-widget="news">
      <span class="news-eyebrow">Noticias</span>
      <div class="news-track">
        <span id="news-headline">Cargando titulares…</span>
      </div>
    </section>

  </main>

  <!-- Orden de carga: config primero, app.js al final orquesta todo -->
  <script src="js/config.js"></script>
  <script src="js/clock.js"></script>
  <script src="js/weather.js"></script>
  <script src="js/bathroom.js"></script>
  <script src="js/calendar.js"></script>
  <script src="js/photos.js"></script>
  <script src="js/news.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
